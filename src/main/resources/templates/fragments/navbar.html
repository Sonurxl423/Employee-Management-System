
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>

<div th:fragment="navbar">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <a class="navbar-brand" th:href="@{/employees/list}">
                EmpTrack
            </a>

            <div class="collapse navbar-collapse">

                <ul class="navbar-nav me-auto">

                    <!--Home-->
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/home}">
                            Home
                        </a>
                    </li>

                    <!-- Dashboard -->
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}">
                            Dashboard
                        </a>
                    </li>

                    <!-- Employees -->
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/employees/list}">
                            Employees
                        </a>
                    </li>

                    <!-- Only HR & ADMIN -->
                    <li class="nav-item"
                        sec:authorize="hasAnyRole('HR','ADMIN')">
                        <a class="nav-link" th:href="@{/employees/showFormForAdd}">
                            Add Employee
                        </a>
                    </li>

                    <!-- Only ADMIN -->
                    <li class="nav-item"
                        sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" href="#">
                            Admin Panel
                        </a>
                    </li>

                </ul>

                <!-- 🔥 RIGHT SIDE DROPDOWN -->
                <div class="d-flex align-items-center text-white">

                    <div class="dropdown">

                        <a class="nav-link dropdown-toggle text-white d-flex align-items-center"
                           href="#"
                           role="button"
                           data-bs-toggle="dropdown"
                           aria-expanded="false">

                            👤 <span class="ms-2" sec:authentication="name"></span>
                        </a>

                        <ul class="dropdown-menu dropdown-menu-end shadow"
                            style="min-width: 220px; border-radius: 10px;">

                            <!-- Profile -->
                            <li>
                                <a class="dropdown-item d-flex align-items-center"
                                   th:href="@{/profile}">
                                    👤 <span class="ms-2">Profile</span>
                                </a>
                            </li>

                            <!-- Role Info -->
                            <li class="px-3 py-2 text-muted small">
                                Role:
                                <span class="badge bg-primary ms-1"
                                      th:text="${#strings.replace(#authentication.principal.authorities.toString(), 'ROLE_', '')}">
                                </span>
                            </li>

                            <li><hr class="dropdown-divider"></li>

                            <!-- Logout -->
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <button type="submit"
                                            class="dropdown-item d-flex align-items-center text-danger">
                                        🚪 <span class="ms-2">Logout</span>
                                    </button>
                                </form>
                            </li>

                        </ul>

                    </div>

                </div>

            </div>
        </div>
    </nav>

</div>

</body>
</html>
