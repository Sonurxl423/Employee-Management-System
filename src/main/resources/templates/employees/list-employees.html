<!DOCTYPE HTML>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Employee Directory</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styling -->
    <link th:href="@{/css/listPage.css}" rel="stylesheet">

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">Employee Directory</h3>

        <!-- Add Button -->
        <a th:href="@{/employees/Add}"
           class="btn btn-primary"
           sec:authorize="hasAnyRole('HR','ADMIN')">
            + Add Employee
        </a>
    </div>

    <form th:action="@{/employees/list}" method="get" class="mb-3">

        <div class="input-group">

            <input type="text"
                   name="keyword"
                   th:value="${keyword}"
                   class="form-control"
                   placeholder="🔍 Search employees...">

            <button class="btn btn-primary" type="submit">
                Search
            </button>

            <a th:href="@{/employees/list}" class="btn btn-secondary">
                Reset
            </a>

        </div>

    </form>

    <!-- Card -->
    <div class="card p-3">

        <table class="table table-hover align-middle">

            <thead>
            <tr>
                <th>👤 First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Department</th>
                <th class="text-center">Actions</th>
            </tr>
            </thead>

            <tbody>

<!--            <tr th:each="emp : ${employees}">-->
                <tr th:each="emp : ${employeePage.content}">
                <td class="fw-semibold" th:text="${emp.firstName}"></td>
                <td th:text="${emp.lastName}"></td>
                <td th:text="${emp.email}"></td>

                <!-- Department Badge -->

                <td>
                    <span th:text="${emp.role}"
                          th:class="'badge badge-dept role-' + ${emp.role}">
                    </span>
                </td>

                <td>
                    <span th:text="${emp.department}"
                          th:class="'badge badge-dept dept-' + ${emp.department}">
                    </span>
                </td>

                <!-- Actions -->
                <td class="text-center">

                    <!-- HR: Update -->
                    <form th:action="@{/employees/Update}"
                          method="POST"
                          class="d-inline"
                          sec:authorize="hasAnyRole('HR','ADMIN')">

                        <input type="hidden" name="employeeId" th:value="${emp.id}" />

                        <button class="btn btn-warning btn-sm">
                            ✏ Update
                        </button>
                    </form>

                    <!-- ADMIN: Delete -->
                    <form th:action="@{/employees/delete}"
                          method="POST"
                          class="d-inline"
                          sec:authorize="hasRole('ADMIN')">

                        <input type="hidden" name="employeeId" th:value="${emp.id}" />

                        <button class="btn btn-danger btn-sm"
                                onclick="return confirm('Delete this employee?')">
                            🗑 Delete
                        </button>
                    </form>
                    <!-- EMPLOYEE: View Only -->
                    <form th:action="@{/employees/list}"
                          method="GET"
                          class="d-inline"
                          sec:authorize="hasRole('USER')">

                        <input type="hidden" name="employeeId" th:value="${emp.id}" />

                        <button class="btn btn-secondary btn-sm">
                            👁 View Only
                        </button>
                    </form>

                </td>

            </tr>

            </tbody>
        </table>

        <!-- Pagination START -->
        <div class="d-flex justify-content-end mt-3">

            <!-- Previous -->
            <a th:if="${currentPage > 0}"
               th:href="@{/employees/list(page=${currentPage - 1}, size=${employeePage.size}, keyword=${keyword})}"
               class="btn btn-outline-primary btn-sm me-2">
                ←
            </a>

            <!-- Page Numbers -->
            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">

        <a th:href="@{/employees/list(page=${i}, size=${employeePage.size}, keyword=${keyword})}"
           th:text="${i + 1}"
           class="btn btn-sm me-1"
           th:classappend="${i == currentPage} ? 'btn-primary' : 'btn-outline-primary'">
        </a>

    </span>

            <!-- Next -->
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/employees/list(page=${currentPage + 1}, size=${employeePage.size}, keyword=${keyword})}"
               class="btn btn-outline-primary btn-sm ms-2">
                →
            </a>

        </div>
        <!-- Pagination END -->


    <!-- Back Button -->
    <div class="mt-3">
        <a th:href="@{/home}" class="btn btn-secondary">
            ← Back to Home
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
