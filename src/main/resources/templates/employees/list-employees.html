<!DOCTYPE HTML>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Employee Directory</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styling -->
    <link th:href="@{/css/listPage.css}" rel="stylesheet">

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">Employee Directory</h3>

        <!-- Add Button -->
        <a th:href="@{/employees/add}"
           class="btn btn-primary"
           sec:authorize="hasAnyRole('HR','ADMIN')">
            + Add Employee
        </a>
    </div>

    <!-- Search -->
    <form method="get" th:action="@{/employees/list}" class="mb-3">
        <input type="text" name="keyword"
               class="form-control"
               placeholder="🔍 Search employees...">
    </form>

    <!-- Card -->
    <div class="card p-3">

        <table class="table table-hover align-middle">

            <thead>
            <tr>
                <th>👤 First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Department</th>
                <th class="text-center">Actions</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="emp : ${employees}">

                <td class="fw-semibold" th:text="${emp.firstName}"></td>
                <td th:text="${emp.lastName}"></td>
                <td th:text="${emp.email}"></td>

                <!-- Department Badge -->
                <td>
                    <span th:text="${emp.department}"
                          th:class="'badge badge-dept dept-' + ${emp.department}">
                    </span>
                </td>

                <!-- Actions -->
                <td class="text-center">

                    <!-- HR: Update -->
                    <form th:action="@{/employees/showFormForUpdate}"
                          method="POST"
                          class="d-inline"
                          sec:authorize="hasRole('HR')">

                        <input type="hidden" name="employeeId" th:value="${emp.id}" />

                        <button class="btn btn-warning btn-sm">
                            ✏ Update
                        </button>
                    </form>

                    <!-- ADMIN: Delete -->
                    <form th:action="@{/employees/delete}"
                          method="POST"
                          class="d-inline"
                          sec:authorize="hasRole('ADMIN')">

                        <input type="hidden" name="employeeId" th:value="${emp.id}" />

                        <button class="btn btn-danger btn-sm"
                                onclick="return confirm('Delete this employee?')">
                            🗑 Delete
                        </button>
                    </form>

                    <!-- EMPLOYEE: No Access -->
                    <span class="badge bg-secondary">
                           👁 View Only
                    </span>


                </td>

            </tr>

            </tbody>
        </table>

    </div>

    <!-- Back Button -->
    <div class="mt-3">
        <a th:href="@{/home}" class="btn btn-secondary">
            ← Back to Home
        </a>
    </div>

</div>

</body>
</html>
