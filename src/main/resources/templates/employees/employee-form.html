<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Save Employee</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <div class="card shadow p-4 mx-auto" style="max-width: 600px; border-radius: 12px;">

        <h3 class="text-center mb-4">👤 Employee Form</h3>

        <form th:action="@{/employees/save}"
              th:object="${employee}"
              method="POST">

            <!-- Hidden ID -->
            <input type="hidden" th:field="*{id}" />

            <!-- First Name -->
            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" th:field="*{firstName}" class="form-control">
                <div class="text-danger" th:if="${#fields.hasErrors('firstName')}"
                     th:errors="*{firstName}"></div>
            </div>

            <!-- Last Name -->
            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" th:field="*{lastName}" class="form-control">
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control">
                <div class="text-danger" th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}"></div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password"
                       id="passwordField"
                       th:field="*{password}"
                       class="form-control"
                       th:placeholder="${employee.id != null} ? '******** ' : 'Enter password'">

                <!-- Show Password Checkbox -->
                <div class="form-check mt-2"
                     th:if="${employee.id == null}">

                    <input class="form-check-input"
                           type="checkbox"
                           id="showPasswordCheck"
                           onclick="togglePassword()">

                    <label class="form-check-label" for="showPasswordCheck">
                        Show Password
                    </label>
                </div>

                <div class="text-danger" th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}"></div>
            </div>

            <!-- Department -->
            <div class="mb-3">
                <label class="form-label">Department</label>
                <select th:field="*{department}" class="form-control">
                    <option value="IT">IT</option>
                    <option value="Sales">Sales</option>
                    <option value="Finance">Finance</option>
                    <option value="Marketing">Marketing</option>
                    <option value="HR">HR</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Role</label>
                <select th:field="*{role}" class="form-control">
                    <option value="USER">USER</option>
                    <option value="HR">HR</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>

            <!-- Salary -->
            <div class="mb-3">
                <label class="form-label">Salary</label>
                <input type="number" step="0.01" th:field="*{salary}" class="form-control">
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between mt-4">

                <a th:href="@{/employees/list}" class="btn btn-secondary">
                    ← Back
                </a>

                <button type="submit" class="btn btn-primary">
                    💾 Save Employee
                </button>

            </div>

        </form>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function togglePassword() {
        const pwd = document.getElementById("passwordField");

        if (pwd.type === "password") {
            pwd.type = "text";
        } else {
            pwd.type = "password";
        }
    }
</script>

</body>
</html>
