<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <div class="card p-4 mx-auto shadow" style="max-width: 600px; border-radius: 12px;">

        <h3 class="text-center mb-4">👤 My Profile</h3>

        <hr>

        <div class="mb-3">
            <strong>Username:</strong>
            <span th:text="${employee.username}"></span>
        </div>

        <div class="mb-3">
            <strong>First Name:</strong>
            <span th:text="${employee.firstName}"></span>
        </div>

        <div class="mb-3">
            <strong>Last Name:</strong>
            <span th:text="${employee.lastName}"></span>
        </div>

        <div class="mb-3">
            <strong>Email:</strong>
            <span th:text="${employee.email}"></span>
        </div>

        <div class="mb-3">
            <strong>Department:</strong>
            <span class="badge bg-primary"
                  th:text="${employee.department}"></span>
        </div>

        <div class="mb-3">
            <strong>Salary:</strong>
            ₹ <span th:text="${employee.salary}"></span>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
